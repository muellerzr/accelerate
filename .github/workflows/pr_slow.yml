name: Manual Workflow Trigger

on:
  issue_comment:
    types: [created, edited]

jobs:
  process-comment:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '!run')
    
    steps:
      - name: Check if commenter has write access
        id: check_permissions
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            return response.data.permission === 'admin' || response.data.permission === 'write';

      - name: Get PR details
        if: steps.check_permissions.outputs.result == 'true'
        id: pr_details
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              head_sha: pr.head.sha,
              head_ref: pr.head.ref,
              head_repo: pr.head.repo.full_name
            }

      - name: Parse workflow names
        if: steps.check_permissions.outputs.result == 'true'
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Find all lines starting with !run and extract workflow names
          WORKFLOW_NAMES=$(echo "$COMMENT" | grep "^!run" | sed 's/^!run[[:space:]]*\([^[:space:]]*\).*/\1/' | tr '\n' ' ')
          echo "workflows=$WORKFLOW_NAMES" >> $GITHUB_OUTPUT

      - name: Checkout PR code
        if: steps.check_permissions.outputs.result == 'true'
        uses: actions/checkout@v3
        with:
          repository: ${{ fromJson(steps.pr_details.outputs.result).head_repo }}
          ref: ${{ fromJson(steps.pr_details.outputs.result).head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run workflows and monitor
        if: steps.check_permissions.outputs.result == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const workflows = '${{ steps.parse.outputs.workflows }}'.trim().split(/\s+/);
            const prDetails = JSON.parse('${{ steps.pr_details.outputs.result }}');
            let commentId;
            let lastCommentId = null;
            
            try {
              // Create initial status comment
              const initialComment = await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Triggered workflows: ${workflows.join(', ')}\nUsing code from: [${prDetails.head_repo}@${prDetails.head_ref}](https://github.com/${prDetails.head_repo}/tree/${prDetails.head_ref})\n:hourglass: Waiting for results... :hourglass:`
              });
              commentId = initialComment.data.id;
              lastCommentId = commentId;

              // Trigger all workflows
              for (const workflow of workflows) {
                await github.rest.actions.createWorkflowDispatch({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: `${workflow}.yml`,
                  ref: prDetails.head_ref
                });
              }

              // Wait for workflows to start
              await new Promise(resolve => setTimeout(resolve, 30000));

              // Monitor all workflows until completion
              let allComplete = false;
              let workflowResults = {};
              let workflowSummaries = {};

              while (!allComplete) {
                allComplete = true;

                for (const workflow of workflows) {
                  if (workflowResults[workflow]) continue;

                  const runs = await github.rest.actions.listWorkflowRuns({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    workflow_id: `${workflow}.yml`,
                    head_sha: prDetails.head_sha,
                    per_page: 1
                  });

                  if (runs.data.workflow_runs.length > 0) {
                    const run = runs.data.workflow_runs[0];
                    if (run.status === 'completed') {
                      workflowResults[workflow] = {
                        conclusion: run.conclusion,
                        url: run.html_url
                      };

                      // Get job summaries
                      let summary = '';
                      try {
                        const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
                          owner: context.repo.owner,
                          repo: context.repo.repo,
                          run_id: run.id
                        });

                        for (const job of jobsResponse.data.jobs) {
                          const jobId = job.html_url.split('/').pop();
                          const summaryUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/jobs/${jobId}/summary_raw`;
                          
                          try {
                            const response = await fetch(summaryUrl);
                            if (response.ok) {
                              const summaryText = await response.text();
                              if (summaryText) {
                                summary += `\n\nJob Summary for ${job.name}:\n${summaryText}`;
                              }
                            }
                          } catch (e) {
                            // Continue if we can't get a particular job summary
                          }
                        }
                        workflowSummaries[workflow] = summary;
                      } catch (e) {
                        // Continue without summaries if we can't get job info
                      }
                    } else {
                      allComplete = false;
                    }
                  } else {
                    allComplete = false;
                  }
                }

                if (!allComplete) {
                  await new Promise(resolve => setTimeout(resolve, 30000)); // Check every 30 seconds
                }
              }

              // Build final status message
              let statusMessage = 'Workflow results:\n';
              for (const workflow of workflows) {
                const result = workflowResults[workflow];
                statusMessage += `\n* ${workflow}: ${result.conclusion === 'success' ? '✅' : '❌'} [Run Details](${result.url})`;
                if (workflowSummaries[workflow]) {
                  statusMessage += workflowSummaries[workflow];
                }
              }

              // Update the last comment instead of creating a new one
              if (lastCommentId) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: lastCommentId,
                  body: statusMessage
                });
              } else {
                const finalComment = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: statusMessage
                });
                lastCommentId = finalComment.data.id;
              }
              
            } catch (error) {
              const errorMessage = `Error with workflows: ${error.message}`;
              
              if (lastCommentId) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: lastCommentId,
                  body: errorMessage
                });
              } else {
                const errorComment = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: errorMessage
                });
                lastCommentId = errorComment.data.id;
              }
            }