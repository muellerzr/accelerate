name: Manual Workflow Trigger

on:
  issue_comment:
    types: [created, edited]
  reaction:
    types: [created]

jobs:
  process-comment:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '!run')) ||
      (github.event_name == 'reaction' && github.event.reaction.content == '+1')
    
    steps:
      - name: Check if user has write access
        id: check_permissions
        uses: actions/github-script@v6
        with:
          script: |
            const username = github.event_name === 'issue_comment' 
              ? context.payload.comment.user.login
              : context.payload.sender.login;
            
            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: username
            });
            return response.data.permission === 'admin' || response.data.permission === 'write';

      - name: Get PR details
        if: steps.check_permissions.outputs.result == 'true'
        id: pr_details
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              head_sha: pr.head.sha,
              head_ref: pr.head.ref,
              head_repo: pr.head.repo.full_name
            }

      - name: Parse workflow name
        if: steps.check_permissions.outputs.result == 'true'
        id: parse
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            COMMENT="${{ github.event.comment.body }}"
            WORKFLOW_NAME=$(echo "$COMMENT" | sed 's/!run //')
          else
            ORIGINAL_COMMENT="${{ github.event.comment.body }}"
            WORKFLOW_NAME=$(echo "$ORIGINAL_COMMENT" | grep -o '!run .*' | sed 's/!run //')
          fi
          echo "workflow=$WORKFLOW_NAME" >> $GITHUB_OUTPUT

      - name: Trigger workflow and update comment
        if: steps.check_permissions.outputs.result == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const workflow = '${{ steps.parse.outputs.workflow }}';
            const prDetails = JSON.parse('${{ steps.pr_details.outputs.result }}');
            
            try {
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: `${workflow}.yml`,
                ref: prDetails.head_ref,
                inputs: {
                  repository: prDetails.head_repo,
                  ref: prDetails.head_sha
                }
              });

              if (github.event_name === 'issue_comment') {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Triggered workflow: ${workflow}\nStatus: In Progress...`
                });
              } else {
                const comment = await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: context.payload.comment.id,
                  body: `Triggered workflow: ${workflow}\nStatus: In Progress...\n\nRe-running workflow based on :+1: reaction`
                });
              }
            } catch (error) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `Error triggering workflow: ${error.message}`
              });
            }
