name: Manual Workflow Trigger

on:
  issue_comment:
    types: [created, edited]

jobs:
  process-comment:
    runs-on: ubuntu-latest
    if: startsWith(github.event.comment.body, '!run')
    
    steps:
      - name: Check if commenter has write access
        id: check_permissions
        uses: actions/github-script@v6
        with:
          script: |
            const response = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login
            });
            return response.data.permission === 'admin' || response.data.permission === 'write';

      - name: Get PR details
        if: steps.check_permissions.outputs.result == 'true'
        id: pr_details
        uses: actions/github-script@v6
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return {
              head_sha: pr.head.sha,
              head_ref: pr.head.ref,
              head_repo: pr.head.repo.full_name
            }

      - name: Parse workflow name
        if: steps.check_permissions.outputs.result == 'true'
        id: parse
        run: |
          COMMENT="${{ github.event.comment.body }}"
          # Find the first line starting with !run and extract just that command
          WORKFLOW_NAME=$(echo "$COMMENT" | grep -m 1 "^!run" | sed 's/^!run[[:space:]]*\([^[:space:]]*\).*/\1/')
          echo "workflow=$WORKFLOW_NAME" >> $GITHUB_OUTPUT

      - name: Checkout PR code
        if: steps.check_permissions.outputs.result == 'true'
        uses: actions/checkout@v3
        with:
          repository: ${{ fromJson(steps.pr_details.outputs.result).head_repo }}
          ref: ${{ fromJson(steps.pr_details.outputs.result).head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run workflow and monitor
        if: steps.check_permissions.outputs.result == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const workflow = '${{ steps.parse.outputs.workflow }}';
            const prDetails = JSON.parse('${{ steps.pr_details.outputs.result }}');
            
            try {
              // Run the workflow
              await github.rest.actions.createWorkflowDispatch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: `${workflow}.yml`,
                ref: prDetails.head_ref
              });
              
              // Find last bot comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              
              const botComments = comments.data.filter(comment => 
                comment.user.login === 'github-actions[bot]' &&
                (comment.body.includes(`Triggered workflow:`) || 
                 comment.body.includes(`completed with status`))
              );
              
              const lastBotComment = botComments[botComments.length - 1];
              
              if (lastBotComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: lastBotComment.id,
                  body: `Triggered workflow: ${workflow}\nUsing code from: ${prDetails.head_repo}@${prDetails.head_ref}\nWaiting for results...`
                });
                commentId = lastBotComment.id;
              } else {
                const initialComment = await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: `Triggered workflow: ${workflow}\nUsing code from: ${prDetails.head_repo}@${prDetails.head_ref}\nWaiting for results...`
                });
                commentId = initialComment.data.id;
              }

              // Wait for workflow to start (give it 30 seconds)
              await new Promise(resolve => setTimeout(resolve, 30000));

              // Monitor the workflow until completion
              let isComplete = false;
              while (!isComplete) {
                const runs = await github.rest.actions.listWorkflowRuns({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  workflow_id: `${workflow}.yml`,
                  head_sha: prDetails.head_sha,
                  per_page: 1
                });

                if (runs.data.workflow_runs.length > 0) {
                  const run = runs.data.workflow_runs[0];
                  if (run.status === 'completed') {
                    // Get the job summaries
                    let summary = '';
                    try {
                      const jobsResponse = await github.rest.actions.listJobsForWorkflowRun({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        run_id: run.id
                      });

                      for (const job of jobsResponse.data.jobs) {
                        const jobId = job.html_url.split('/').pop();
                        const summaryUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${run.id}/jobs/${jobId}/summary_raw`;
                        
                        try {
                          const response = await fetch(summaryUrl);
                          if (response.ok) {
                            const summaryText = await response.text();
                            if (summaryText) {
                              summary += `\n\nJob Summary for ${job.name}:\n${summaryText}`;
                            }
                          }
                        } catch (e) {
                          // If we can't get a particular job summary, continue to the next
                        }
                      }
                    } catch (e) {
                      // If we can't get job info, continue without summaries
                    }

                    await github.rest.issues.updateComment({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      comment_id: commentId,
                      body: `Workflow ${workflow} completed with status: ${run.conclusion}\nRun details: ${run.html_url}${summary}`
                    });
                    isComplete = true;
                  }
                }

                if (!isComplete) {
                  await new Promise(resolve => setTimeout(resolve, 30000)); // Check every 30 seconds
                }
              }
              
            } catch (error) {
              const errorMessage = `Error with workflow: ${error.message}${summary}`;
              
              // Find last bot comment
              const comments = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number
              });
              
              const botComments = comments.data.filter(comment => 
                comment.user.login === 'github-actions[bot]' &&
                (comment.body.includes(`Triggered workflow:`) || 
                 comment.body.includes(`completed with status`))
              );
              
              const lastBotComment = botComments[botComments.length - 1];
              
              if (lastBotComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: lastBotComment.id,
                  body: errorMessage
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: errorMessage
                });
              }
            }